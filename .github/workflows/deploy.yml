name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - revamped
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm ci || npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: static # The folder where the build is output (as per vite.config.ts)
          branch: gh-pages # The branch the action should deploy to.
